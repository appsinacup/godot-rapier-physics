name: Physics Server Rapier Build
description: Build Godot Cpp and the Physics Server 2D Extension.

inputs:
  arch:
    required: true
    default: ''
    description: Rust target platform.
  extra_flags:
    required: false
    default: ''
    description: Rust extra flags.
  features:
    required: true
    description: simd-stable,simd-nightly,parallel,enhanced-determinism
  api_feature:
    required: false
    default: api-custom
    description: Godot API feature to use. Must be exactly one api-* feature.
  profile:
    required: false
    default: release
    description: Cargo profile to use.
  toolchain:
    required: false
    default: ''
    description: Rust toolchain override. Defaults to rust-toolchain.toml.

runs:
  using: composite
  steps:
    - name: Show targets
      shell: sh
      run: |
        rustc --print=target-list
    - name: Rust Add target
      shell: sh
      run: |
        TOOLCHAIN="${{ inputs.toolchain }}"
        if [ -z "$TOOLCHAIN" ]; then
          TOOLCHAIN=$(grep -E '^channel' rust-toolchain.toml | sed -E 's/channel = "(.*)"/\1/')
        fi
        rustup toolchain install "$TOOLCHAIN"
        rustup component add rust-src --toolchain "$TOOLCHAIN"
        rustup target add ${{ inputs.arch }} --toolchain "$TOOLCHAIN"
    - name: Build
      shell: sh
      run: |
        TOOLCHAIN="${{ inputs.toolchain }}"
        if [ -z "$TOOLCHAIN" ]; then
          TOOLCHAIN=$(grep -E '^channel' rust-toolchain.toml | sed -E 's/channel = "(.*)"/\1/')
        fi
        GDRUST_GODOT_BIN="${GODOT4:-}" cargo +"$TOOLCHAIN" build --target=${{ inputs.arch }} --profile=${{ inputs.profile }} --features="${{ inputs.features }},${{ inputs.api_feature }}" ${{ inputs.extra_flags }}
    - name: Copy to release
      shell: sh
      run: |
        mkdir -p target/release
        rm -rf target/release
        cp -rf target/${{ inputs.arch }}/${{ inputs.profile }} target/release
    - name: Build Rapier Macos Universal
      shell: sh
      # we already built for x86_64-apple-darwin for mac, now build arm64
      if: ${{ inputs.arch == 'x86_64-apple-darwin'}}
      run: |
        mkdir -p target/release
        TOOLCHAIN="${{ inputs.toolchain }}"
        if [ -z "$TOOLCHAIN" ]; then
          TOOLCHAIN=$(grep -E '^channel' rust-toolchain.toml | sed -E 's/channel = "(.*)"/\1/')
        fi
        rustup target add aarch64-apple-darwin --toolchain "$TOOLCHAIN"
        GDRUST_GODOT_BIN="${GODOT4:-}" cargo +"$TOOLCHAIN" build --target=aarch64-apple-darwin --profile=${{ inputs.profile }} --features="${{ inputs.features }},${{ inputs.api_feature }}" ${{ inputs.extra_flags }}
        lipo -create -output target/release/libgodot_rapier.dylib target/aarch64-apple-darwin/${{ inputs.profile }}/libgodot_rapier.dylib target/x86_64-apple-darwin/${{ inputs.profile }}/libgodot_rapier.dylib
    - name: Move Static Libs macOS
      shell: sh
      if: ${{ inputs.arch == 'x86_64-apple-darwin'}}
      run: |
        mv target/x86_64-apple-darwin/${{ inputs.profile }}/libgodot_rapier.a target/release/libgodot_rapier.x86_64.a
        mv target/aarch64-apple-darwin/${{ inputs.profile }}/libgodot_rapier.a target/release/libgodot_rapier.arm64.a
