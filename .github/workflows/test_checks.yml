name: 🧪 Run Tests
on:
  workflow_call:

env:
  GODOT_VERSION: '4.7-stable'

jobs:
  run-unit-tests:
    name: Run Unit Tests ${{ matrix.dimensions.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dimensions:
          - { name: 2D, feature: single-dim2 }
          - { name: 3D, feature: single-dim3 }
    steps:
      - uses: actions/checkout@v6
      - name: Setup Godot
        uses: appsinacup/setup-godot-action@main
        with:
          version: ${{ env.GODOT_VERSION }}

      - name: Run Unit Tests
        shell: bash
        run: |
          cargo test --all-targets --features="${{ matrix.dimensions.feature }},test,simd-stable,experimental-threads,register-docs,api-custom"

  run-integration-tests:
    name: Run Godot Tests ${{ matrix.dimensions.name }} (${{ matrix.os.name }})
    runs-on: ${{ matrix.os.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: Linux, runner: ubuntu-latest }
          - { name: macOS, runner: macos-26 }
          - { name: Windows, runner: windows-latest }
        dimensions:
          - { name: 2D, short: 2d, feature: single-dim2 }
          - { name: 3D, short: 3d, feature: single-dim3 }
    steps:
      - uses: actions/checkout@v6

      - name: Setup Godot
        uses: appsinacup/setup-godot-action@main
        with:
          version: ${{ env.GODOT_VERSION }}

      - name: Build Extension
        shell: bash
        run: |
          set -euo pipefail
          cargo build --features="${{ matrix.dimensions.feature }},test,simd-stable,experimental-threads,register-docs,api-custom"

          addon_dir="bin${{ matrix.dimensions.short }}/addons/godot-rapier${{ matrix.dimensions.short }}/bin"
          case "$RUNNER_OS" in
            Linux)
              cp target/debug/libgodot_rapier.so "$addon_dir/libgodot_rapier.linux.x86_64-unknown-linux-gnu.so"
              ;;
            macOS)
              dylib="$addon_dir/libgodot_rapier.macos.framework/libgodot_rapier.macos.dylib"
              cp target/debug/libgodot_rapier.dylib "$dylib"
              codesign --force --sign - "$dylib"
              ;;
            Windows)
              cp target/debug/godot_rapier.dll "$addon_dir/libgodot_rapier.windows.x86_64-pc-windows-msvc.dll"
              ;;
            *)
              echo "Unsupported runner OS: $RUNNER_OS"
              exit 1
              ;;
          esac

      - name: Run Godot Test Suite
        continue-on-error: true
        shell: bash
        run: |
          set +e
          set -o pipefail
          "$GODOT4" --headless --path ./bin${{ matrix.dimensions.short }} --import 2>&1 | tee godot-import-${{ matrix.dimensions.short }}.log
          import_status=${PIPESTATUS[0]}
          if [ "$import_status" -ne 0 ]; then
            echo "Godot ${{ matrix.dimensions.name }} import failed with status ${import_status}"
            exit "$import_status"
          fi

          "$GODOT4" --headless --path ./bin${{ matrix.dimensions.short }} start.tscn 2>&1 | tee godot-tests-${{ matrix.dimensions.short }}.log
          godot_status=${PIPESTATUS[0]}
          set -e

          if grep -q "STATUS: FAILED" godot-tests-${{ matrix.dimensions.short }}.log; then
            echo "Godot ${{ matrix.dimensions.name }} tests failed"
            exit 1
          fi

          if ! grep -q "STATUS: SUCCESS" godot-tests-${{ matrix.dimensions.short }}.log; then
            echo "Godot ${{ matrix.dimensions.name }} tests did not finish successfully"
            exit 1
          fi

          if [ "$godot_status" -ne 0 ]; then
            echo "Godot exited with status ${godot_status}"
            exit "$godot_status"
          fi

      - name: Upload Godot Test Log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: godot-tests-${{ matrix.dimensions.short }}-${{ matrix.os.name }}-log
          path: |
            godot-import-${{ matrix.dimensions.short }}.log
            godot-tests-${{ matrix.dimensions.short }}.log
          if-no-files-found: warn
