name: 🧪 Run Tests
on:
  workflow_call:

env:
  GODOT_VERSION: '4.6.2-stable'

jobs:
  run-unit-tests-2d:
    name: Run Unit Tests 2D
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Godot
        uses: appsinacup/setup-godot-action@main
        with:
          version: ${{ env.GODOT_VERSION }}

      - name: Run Unit Tests for 2D Build
        shell: sh
        run: |
          cargo test --all-targets --features="build2d,test" --no-default-features
  run-unit-tests-3d:
    name: Run Unit Tests 3D
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Godot
        uses: appsinacup/setup-godot-action@main
        with:
          version: ${{ env.GODOT_VERSION }}

      - name: Run Unit Tests for 3D Build
        shell: sh
        run: |
          cargo test --all-targets --features="build3d,test" --no-default-features
  run-integration-tests-2d:
    name: Run Godot Tests 2D (non-blocking)
    runs-on: macos-latest
    timeout-minutes: 30
    # Current Godot regression suites have known failures; keep them visible until baseline is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Godot
        uses: appsinacup/setup-godot-action@main
        with:
          version: ${{ env.GODOT_VERSION }}

      - name: Build 2D Extension
        shell: sh
        run: |
          cargo build --features="build2d,test" --no-default-features
          cp target/debug/libgodot_rapier.dylib bin2d/addons/godot-rapier2d/bin/libgodot_rapier.macos.framework/libgodot_rapier.macos.dylib
          codesign --force --sign - bin2d/addons/godot-rapier2d/bin/libgodot_rapier.macos.framework/libgodot_rapier.macos.dylib

      - name: Run Godot Test Suite 2D
        shell: bash
        run: |
          set +e
          set -o pipefail
          godot --headless --path ./bin2d --import 2>&1 | tee godot-import-2d.log
          import_status=${PIPESTATUS[0]}
          if [ "$import_status" -ne 0 ]; then
            echo "Godot 2D import failed with status ${import_status}"
            exit "$import_status"
          fi

          godot --headless --path ./bin2d start.tscn 2>&1 | tee godot-tests-2d.log
          godot_status=${PIPESTATUS[0]}
          set -e

          if grep -q "STATUS: FAILED" godot-tests-2d.log; then
            echo "Godot 2D tests failed"
            exit 1
          fi

          if ! grep -q "STATUS: SUCCESS" godot-tests-2d.log; then
            echo "Godot 2D tests did not finish successfully"
            exit 1
          fi

          if [ "$godot_status" -ne 0 ]; then
            echo "Godot exited with status ${godot_status}"
            exit "$godot_status"
          fi

      - name: Upload 2D Godot Test Log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: godot-tests-2d-log
          path: |
            godot-import-2d.log
            godot-tests-2d.log
          if-no-files-found: error

  run-integration-tests-3d:
    name: Run Godot Tests 3D (non-blocking)
    runs-on: macos-latest
    timeout-minutes: 30
    # Current Godot regression suites have known failures; keep them visible until baseline is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Godot
        uses: appsinacup/setup-godot-action@main
        with:
          version: ${{ env.GODOT_VERSION }}

      - name: Build 3D Extension
        shell: sh
        run: |
          cargo build --features="build3d,test" --no-default-features
          cp target/debug/libgodot_rapier.dylib bin3d/addons/godot-rapier3d/bin/libgodot_rapier.macos.framework/libgodot_rapier.macos.dylib
          codesign --force --sign - bin3d/addons/godot-rapier3d/bin/libgodot_rapier.macos.framework/libgodot_rapier.macos.dylib

      - name: Run Godot Test Suite 3D
        shell: bash
        run: |
          set +e
          set -o pipefail
          godot --headless --path ./bin3d --import 2>&1 | tee godot-import-3d.log
          import_status=${PIPESTATUS[0]}
          if [ "$import_status" -ne 0 ]; then
            echo "Godot 3D import failed with status ${import_status}"
            exit "$import_status"
          fi

          godot --headless --path ./bin3d start.tscn 2>&1 | tee godot-tests-3d.log
          godot_status=${PIPESTATUS[0]}
          set -e

          if grep -q "STATUS: FAILED" godot-tests-3d.log; then
            echo "Godot 3D tests failed"
            exit 1
          fi

          if ! grep -q "STATUS: SUCCESS" godot-tests-3d.log; then
            echo "Godot 3D tests did not finish successfully"
            exit 1
          fi

          if [ "$godot_status" -ne 0 ]; then
            echo "Godot exited with status ${godot_status}"
            exit "$godot_status"
          fi

      - name: Upload 3D Godot Test Log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: godot-tests-3d-log
          path: |
            godot-import-3d.log
            godot-tests-3d.log
          if-no-files-found: error
