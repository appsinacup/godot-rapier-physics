name: 📊 Static Checks
on:
  workflow_call:

jobs:
  format-code:
    name: Format Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Format
        shell: sh
        run: |
          rustup component add rustfmt
          cargo fmt --all -- --config-path ./rustfmt.toml --check

  clippy-2d:
    name: Clippy 2D
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Clippy 2D
        shell: sh
        run: |
          rustup component add clippy
          cargo clippy --all-targets --features="single-dim2,serde-serialize,simd-stable,experimental-threads,register-docs,api-4-7" -- -D warnings

  clippy-3d:
    name: Clippy 3D
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Clippy 3D
        shell: sh
        run: |
          rustup component add clippy
          cargo clippy --all-targets --features="single-dim3,serde-serialize,simd-stable,experimental-threads,register-docs,api-4-7" -- -D warnings

  gdlint:
    name: GDLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'gdtoolkit==4.*'

      - name: Lint Rapier2D
        run: |
          gdlint bin2d/addons/godot-rapier2d/**.gd

      - name: Lint Rapier3D
        run: |
          gdlint bin3d/addons/godot-rapier3d/**.gd
